function loadScriptChain(urls, onDone){
  var i = 0;
  function tryNext(){
    if(i >= urls.length){ onDone(false); return; }
    var url = urls[i++];
    var s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload = function(){ onDone(true); };
    s.onerror = function(){ tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
}
 
function showError(msg){
  document.getElementById('errmsg').style.display = 'block';
  document.getElementById('errmsg').textContent = msg;
  document.getElementById('retryBtn').style.display = 'inline-block';
}
 
loadScriptChain(REACT_SOURCES, function(reactOk){
  if(!reactOk){
    showError('Errore: impossibile caricare React da nessuna fonte. Controlla la connessione.');
    return;
  }
  loadScriptChain(REACTDOM_SOURCES, function(domOk){
    if(!domOk){
      showError('Errore: impossibile caricare ReactDOM da nessuna fonte. Controlla la connessione.');
      return;
    }
    runApp();
  });
});

function computeAutoDietTargets(profile) {
    const weight = parseFloat(String(profile.weightKg).replace(",", "."));
    const bf = parseFloat(String(profile.bfPercent).replace(",", "."));
    if (isNaN(weight) || isNaN(bf) || weight <= 0 || bf <= 0 || bf >= 70)
        return null;
    const leanMass = weight * (1 - bf / 100);
    const bmr = 370 + 21.6 * leanMass;
    const activityMultipliers = { sedentario: 1.3, moderato: 1.5, attivo: 1.7 };
    const tdee = bmr * (activityMultipliers[profile.activity] || 1.5);
    const goalMultipliers = { dimagrimento: 0.8, mantenimento: 1, aumento: 1.1 };
    const baseKcal = tdee * (goalMultipliers[profile.goal] || 1);
    const trainingKcal = Math.round(baseKcal + 150);
    const restKcal = Math.round(baseKcal - 150);
    const proteinG = Math.round(weight * 2);
    const fatG = Math.round(weight * 0.8);
    const proteinKcal = proteinG * 4;
    const fatKcal = fatG * 9;
    const trainingCarbsG = Math.max(0, Math.round((trainingKcal - proteinKcal - fatKcal) / 4));
    const restCarbsG = Math.max(0, Math.round((restKcal - proteinKcal - fatKcal) / 4));
    return {
        bmr: Math.round(bmr),
        tdee: Math.round(tdee),
        training: { kcal: trainingKcal, p: proteinG, c: trainingCarbsG, f: fatG },
